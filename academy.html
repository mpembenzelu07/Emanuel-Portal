<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy Details | Elite Football</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
    body{background:#f0f2f5;color:#1e2a3a;}
    .glass-nav{background:rgba(10,25,47,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
    .nav-container{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
    .logo{display:flex;align-items:center;gap:10px;font-size:1.5rem;font-weight:800;color:white;}
    .logo i{color:#3b82f6;}
    .logo-light{font-weight:400;color:#94a3b8;}
    .nav-links{display:flex;gap:1.5rem;list-style:none;}
    .nav-links a{color:#e2e8f0;text-decoration:none;font-weight:500;transition:0.2s;display:flex;align-items:center;gap:6px;}
    .nav-links a:hover{color:#3b82f6;}
    .mobile-menu{display:none;font-size:1.5rem;color:white;cursor:pointer;}
    .academy-detail-container{max-width:1000px;margin:2rem auto;padding:0 1rem;}
    .detail-card{background:white;border-radius:2rem;overflow:hidden;box-shadow:0 20px 35px -10px rgba(0,0,0,0.1);padding:2rem;}
    .academy-name{font-size:2rem;margin-bottom:0.5rem;}
    .info-row{display:flex;align-items:center;gap:1rem;margin:1rem 0;flex-wrap:wrap;}
    .info-row i{width:28px;color:#3b82f6;}
    .whatsapp-btn{background:#25D366;color:white;padding:0.6rem 1.2rem;border-radius:40px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-weight:600;margin-top:0.5rem;}
    .players-section{margin-top:2rem;}
    .filter-bar{display:flex;gap:1rem;margin:1rem 0;flex-wrap:wrap;}
    .filter-btn{background:#eef2ff;border:none;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;font-weight:500;transition:0.2s;}
    .filter-btn.active{background:#3b82f6;color:white;}
    .players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:1rem;}
    .player-card{background:#f8fafc;border-radius:1rem;padding:1rem;border-left:4px solid #3b82f6;}
    .player-name{font-weight:700;font-size:1.1rem;}
    .player-age{color:#475569;font-size:0.9rem;}
    .player-pos{display:inline-block;background:#e2e8f0;padding:0.2rem 0.6rem;border-radius:30px;font-size:0.75rem;margin-top:0.5rem;}
    footer{background:#0f172a;color:#cbd5e1;text-align:center;padding:2rem;margin-top:2rem;}
    @media (max-width:768px){ .nav-links{ display:none; flex-direction:column; background:#0f172a; position:absolute; top:70px; left:0; width:100%; padding:1rem; gap:1rem; } .nav-links.show{ display:flex; } .mobile-menu{ display:block; } }
  </style>
</head>
<body>
  <nav class="glass-nav"><div class="nav-container"><div class="logo"><i class="fas fa-futbol"></i><span>EliteScout<span class="logo-light">.tz</span></span></div><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="temeke.html">Temeke</a></li><li><a href="kinondoni.html">Kinondoni</a></li><li><a href="ilala.html">Ilala</a></li><li><a href="kigamboni.html">Kigamboni</a></li><li><a href="ubungo.html">Ubungo</a></li></ul><div class="mobile-menu"><i class="fas fa-bars"></i></div></div></nav>
  <div id="academyDetailRoot" class="academy-detail-container"></div>
  <footer><p><i class="fas fa-copyright"></i> 2025 Elite Football Academies</p><div class="social-icons"><i class="fab fa-instagram"></i><i class="fab fa-whatsapp"></i><i class="fab fa-twitter"></i></div></footer>
  <script src="script.js"></script>
  <script>
    document.querySelector('.mobile-menu')?.addEventListener('click',()=>document.querySelector('.nav-links').classList.toggle('show'));
    if(typeof window.loadAcademyDetail === 'function') window.loadAcademyDetail();
  </script>
</body>
</html>
